<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mishitza</title>
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mishitza" />
    <meta name="description" content="Track workouts and exercises with Mishitza." />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main id="app"></main>
    </div>

    <div id="dialog-root"></div>

    <template id="home-screen-template">
      <section class="screen screen-home">
        <header class="hero">
          <p class="eyebrow">Workout Tracker</p>
          <h1>Mishitza</h1>
        </header>

        <div id="workout-list" class="workout-list"></div>

        <div class="bottom-action">
          <div class="card workout-form hidden" id="workout-form-card">
            <label class="field">
              <input id="workout-title-input" type="text" maxlength="60" placeholder="Push day" />
            </label>

            <div class="actions">
              <button class="primary-button" id="save-workout">Add</button>
            </div>
          </div>

          <button class="primary-button add-workout-button" id="show-workout-form">+ Add workout</button>
        </div>

        <div class="home-links">
          <button class="text-link" id="export-data">Export</button>
          <button class="text-link" id="import-data">Import</button>
          <input id="import-file-input" class="hidden" type="file" accept="application/json,.json" />
        </div>
      </section>
    </template>

    <template id="workout-screen-template">
      <section class="screen screen-workout">
        <div class="section-head workout-head">
          <div class="workout-head-copy">
            <div class="workout-title-row">
              <h2 id="workout-screen-title"></h2>
              <button class="edit-title-button" id="edit-workout-title" aria-label="Edit workout title">
                <span class="edit-icon edit-icon-flipped" aria-hidden="true">✎</span>
              </button>
            </div>
            <input
              id="workout-title-edit-input"
              class="title-edit-input hidden"
              type="text"
              maxlength="60"
              placeholder="Workout title"
            />
            <div class="progress-shell" aria-label="Workout progress">
              <div id="workout-progress-bar" class="progress-bar"></div>
            </div>
          </div>
        </div>

        <div id="exercise-list" class="exercise-list"></div>

        <div class="bottom-action exercise-action">
          <div id="exercise-form" class="card workout-form exercise-form hidden">
            <input id="exercise-name-input" type="text" maxlength="80" placeholder="Exercise name" />
            <input id="exercise-max-input" type="text" maxlength="30" placeholder="Max (kg, time)" />
            <button class="primary-button" id="confirm-add-exercise">Add</button>
          </div>
          <button class="primary-button add-workout-button" id="show-exercise-form">+ Add exercise</button>
        </div>

        <div id="workout-complete-message" class="complete-message hidden">
          <strong>Workout complete</strong>
          <span>Great job 💪</span>
        </div>

        <div class="stopwatch-panel">
          <div id="workout-stopwatch" class="stopwatch-time">00:00</div>
          <div class="stopwatch-actions">
            <button class="primary-button" id="toggle-stopwatch">Start</button>
            <button class="ghost-button" id="reset-stopwatch">Reset</button>
          </div>
        </div>
      </section>
    </template>

    <script src="app.js"></script>
  </body>
</html>
